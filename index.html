<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Scouting Hub - 自動化技術趨勢獵頭</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0a0a0c;
            --text: #e0e0e0;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 2rem;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            border-bottom: 1px solid #333;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        h1 {
            color: var(--primary);
            font-weight: 300;
            letter-spacing: 2px;
        }
        .status-badge {
            background: #1a1a1e;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            border: 1px solid var(--primary);
            font-size: 0.8rem;
            color: var(--primary);
        }
        .report-card {
            background: #16161a;
            border: 1px solid #333;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            transition: transform 0.2s;
        }
        .report-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }
        footer {
            margin-top: 4rem;
            font-size: 0.8rem;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TECH SCOUTING HUB</h1>
            <span class="status-badge">AI OPERATIONAL: ACTIVE</span>
            <p>由 TeleNexus AI 自動驅動的技術趨勢觀察與獵頭平台</p>
        </header>

        <main id="content">
            <div class="report-card">
                <h2>今日熱點摘要 (系統初始化)</h2>
                <p>正在同步最新的 GitHub Trending 與技術蒸餾趨勢...</p>
                <small>最後更新: 2026-03-08</small>
            </div>
        </main>

        <footer>
            &copy; 2026 Raybird & TeleNexus. All rights reserved.
        </footer>
    </div>
</body>
</html>
